name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x backend/gradlew

      - name: Backend Tests (H2)
        run: |
          cd backend
          ./gradlew test jacocoTestReport
        env:
          SPRING_PROFILES_ACTIVE: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Frontend Lint & Tests
        run: |
          cd frontend
          npm ci
          npm run lint
          npm test -- --coverage

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/build/reports/jacoco/

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x backend/gradlew

      - name: Run Checkstyle
        run: |
          cd backend
          ./gradlew checkstyleMain checkstyleTest
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Backend Build, Test & Coverage
        run: |
          cd backend
          ./gradlew build jacocoTestReport
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Frontend Lint & Tests
        run: |
          cd frontend
          npm ci
          npm run lint
          npm test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=advprog-2026-b02-project
            -Dsonar.projectKey=advprog-2026-B02-project_BidMart
            -Dsonar.sources=backend/src/main/java,frontend/app
            -Dsonar.tests=backend/src/test/java,frontend/__tests__
            -Dsonar.java.binaries=backend/build/classes/java/main
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality ]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dummy Deploy to Staging
        run: |
          echo "============================================"
          echo "  STAGING DEPLOYMENT"
          echo "============================================"
          echo "All CI checks passed!"
          echo "Database: Neon (staging branch)"
          echo "[DUMMY] Would deploy to staging..."
          echo "============================================"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dummy Deploy to Production
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOYMENT"
          echo "============================================"
          echo "All CI checks passed!"
          echo "Database: Neon (main branch)"
          echo "[DUMMY] Would deploy to production..."
          echo "============================================"
